<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易 BMI 計算器</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 320px;
        }

        h2 {
            text-align: center;
            color: #333333;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555555;
            font-weight: bold;
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            box-sizing: border-box;
            /* 確保寬度包含 padding */
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #4a90e2;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4a90e2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        button:hover {
            background-color: #357abd;
        }

        .info-text {
            margin-top: 20px;
            font-size: 12px;
            color: #888888;
            text-align: center;
            line-height: 1.6;
        }

        #bmi {
            font-family: 'Courier New', Courier, monospace;
            font-size: 36px;
            color: blue;
            text-align: center;
            line-height: 1.6;
            background-color: bisque;
            border-radius: 6px;
            margin-top: 12px;
        }

        #category {
            font-family: 'Courier New', Courier, monospace;
            font-size: 3rem;
            color: blue;
            text-align: center;
            line-height: 1.6;
            background-color: bisque;
            border-radius: 6px;
            margin-top: 12px;
        }
    </style>
</head>

<body>

    <div class="container">
        <a href="/">回首頁</a>
        <h2>BMI 計算器</h2>
        <!-- action="/calc-bmi" 在action= 路由器-->
        <form action="/calc-bmi" method="GET">
            <div class="form-group">
                <label>身高 (cm)</label>
                <!-- name="height"的 height 會顯示在網址上 -->
                <!-- value="{{height}}" {{height}}後端-->
                <input step=0.1 value="{{height}}" type="number" name="height" placeholder="請輸入身高" required>
            </div>
            <div class="form-group">
                <label>體重 (kg)</label>
                <input step=0.1 value="{{weight}}" type="number" name="weight" placeholder="請輸入體重" required>
            </div>
            <button type="submit">計算 BMI</button>
        </form>

        {% if result %}

        <div id="bmi">BMI：{{result["bmi"]}}</div>
        <div id="category">評語：{{result["category"]}}</div>

        {% endif %}
        
        <div class="info-text">
            註：BMI 公式為 體重(kg) / 身高(m)²<br>
            18.5 ≦ BMI ＜ 24 為正常範圍
        </div>
    </div>

</body>

</html>
